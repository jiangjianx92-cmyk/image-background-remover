<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Background Remover</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .drop-zone.drag-over {
      border-color: #3b82f6;
      background-color: #eff6ff;
    }
    .hidden { display: none; }
    .checkerboard {
      background-image: 
        linear-gradient(45deg, #ccc 25%, transparent 25%), 
        linear-gradient(-45deg, #ccc 25%, transparent 25%), 
        linear-gradient(45deg, transparent 75%, #ccc 75%), 
        linear-gradient(-45deg, transparent 75%, #ccc 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-4">
  
  <div class="max-w-2xl w-full">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-gray-900 mb-2">🪄 Image Background Remover</h1>
      <p class="text-gray-600">Upload an image and remove its background instantly</p>
    </div>

    <!-- Upload Zone -->
    <div 
      id="dropZone" 
      class="drop-zone border-4 border-dashed border-gray-300 rounded-2xl p-12 text-center cursor-pointer hover:border-blue-500 hover:bg-white transition-all duration-200 bg-white"
    >
      <input type="file" id="fileInput" accept="image/*" class="hidden">
      
      <div id="uploadPrompt">
        <div class="text-6xl mb-4">📤</div>
        <p class="text-lg text-gray-700 mb-2">Drag & drop your image here</p>
        <p class="text-gray-500">or click to browse</p>
        <p class="text-sm text-gray-400 mt-4">Supports: JPG, PNG, WebP</p>
      </div>

      <div id="previewContainer" class="hidden">
        <div class="mb-4">
          <p class="text-sm text-gray-500 mb-2">Original Image:</p>
          <img id="previewImage" class="max-h-64 mx-auto rounded-lg shadow-md" alt="Preview">
        </div>
      </div>
    </div>

    <!-- Process Button -->
    <div class="text-center mt-6">
      <button 
        id="processBtn" 
        class="hidden bg-blue-600 hover:bg-blue-700 text-white font-semibold px-8 py-3 rounded-xl shadow-lg hover:shadow-xl transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        ✨ Remove Background
      </button>
    </div>

    <!-- Loading Spinner -->
    <div id="loading" class="hidden text-center mt-8">
      <div class="inline-block w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
      <p class="text-gray-600">Processing your image...</p>
    </div>

    <!-- Result Section -->
    <div id="resultSection" class="hidden mt-8">
      <div class="bg-white rounded-2xl shadow-lg p-6">
        <h3 class="text-lg font-semibold text-gray-800 mb-4 text-center">✨ Result</h3>
        
        <!-- Before/After Comparison -->
        <div class="flex gap-4 justify-center items-center">
          <div class="text-center">
            <p class="text-xs text-gray-500 mb-2">Original</p>
            <div class="checkerboard rounded-lg overflow-hidden">
              <img id="resultOriginal" class="max-h-64 max-w-full" alt="Original">
            </div>
          </div>
          
          <div class="text-3xl text-gray-400">→</div>
          
          <div class="text-center">
            <p class="text-xs text-gray-500 mb-2">No Background</p>
            <div class="checkerboard rounded-lg overflow-hidden">
              <img id="resultImage" class="max-h-64 max-w-full" alt="Result">
            </div>
          </div>
        </div>

        <!-- Download Button -->
        <div class="text-center mt-6">
          <button 
            id="downloadBtn"
            class="bg-green-600 hover:bg-green-700 text-white font-semibold px-6 py-3 rounded-xl shadow-md hover:shadow-lg transition-all duration-200"
          >
            ⬇️ Download Image
          </button>
        </div>

        <!-- Try Another -->
        <div class="text-center mt-4">
          <button 
            id="resetBtn"
            class="text-gray-500 hover:text-gray-700 underline text-sm"
          >
            Process another image
          </button>
        </div>
      </div>
    </div>

    <!-- Error Message -->
    <div id="errorMessage" class="hidden mt-6 p-4 bg-red-50 border border-red-200 rounded-xl text-red-700 text-center"></div>

    <!-- Footer -->
    <div class="text-center mt-12 text-gray-400 text-sm">
      <p>Powered by <a href="https://www.remove.bg" target="_blank" class="text-blue-500 hover:underline">remove.bg</a> & <a href="https://workers.cloudflare.com" target="_blank" class="text-orange-500 hover:underline">Cloudflare Workers</a></p>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const uploadPrompt = document.getElementById('uploadPrompt');
    const previewContainer = document.getElementById('previewContainer');
    const previewImage = document.getElementById('previewImage');
    const processBtn = document.getElementById('processBtn');
    const loading = document.getElementById('loading');
    const resultSection = document.getElementById('resultSection');
    const resultOriginal = document.getElementById('resultOriginal');
    const resultImage = document.getElementById('resultImage');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');
    const errorMessage = document.getElementById('errorMessage');

    let selectedFile = null;
    let resultBlob = null;

    // Click to upload
    dropZone.addEventListener('click', () => fileInput.click());

    // File selected via input
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFile(e.target.files[0]);
      }
    });

    // Drag and drop
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files.length > 0) {
        handleFile(e.dataTransfer.files[0]);
      }
    });

    function handleFile(file) {
      if (!file.type.startsWith('image/')) {
        showError('Please select an image file');
        return;
      }

      selectedFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        previewImage.src = e.target.result;
        uploadPrompt.classList.add('hidden');
        previewContainer.classList.remove('hidden');
        processBtn.classList.remove('hidden');
        errorMessage.classList.add('hidden');
        resultSection.classList.add('hidden');
      };
      reader.readAsDataURL(file);
    }

    // Process image
    processBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      processBtn.disabled = true;
      loading.classList.remove('hidden');
      errorMessage.classList.add('hidden');

      try {
        const formData = new FormData();
        formData.append('image', selectedFile);

        const response = await fetch('/api/removebg', {
          method: 'POST',
          body: formData,
        });

        if (!response.ok) {
          const error = await response.json().catch(() => ({ error: 'Unknown error' }));
          throw new Error(error.error || 'Failed to process image');
        }

        resultBlob = await response.blob();
        const resultUrl = URL.createObjectURL(resultBlob);

        resultOriginal.src = previewImage.src;
        resultImage.src = resultUrl;

        loading.classList.add('hidden');
        resultSection.classList.remove('hidden');
      } catch (err) {
        loading.classList.add('hidden');
        showError(err.message);
      } finally {
        processBtn.disabled = false;
      }
    });

    // Download result
    downloadBtn.addEventListener('click', () => {
      if (!resultBlob) return;

      const url = URL.createObjectURL(resultBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'background-removed.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    // Reset
    resetBtn.addEventListener('click', () => {
      selectedFile = null;
      resultBlob = null;
      fileInput.value = '';
      previewImage.src = '';
      resultImage.src = '';
      uploadPrompt.classList.remove('hidden');
      previewContainer.classList.add('hidden');
      processBtn.classList.add('hidden');
      resultSection.classList.add('hidden');
      errorMessage.classList.add('hidden');
    });

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.remove('hidden');
    }
  </script>
</body>
</html>
